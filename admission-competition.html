<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3년간 경쟁률 · 경기 예고</title>
<link rel="stylesheet" href="scene.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    color: #3b2a1e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #f5efe4;
    background-attachment: fixed;
    overflow-x: hidden;
  }

  /* 상단 바 */
  .topbar {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    background: #e6d8c3;
    border-bottom: 1px solid rgba(139,94,60,0.3);
    padding: 14px 18px;
  }
  .topbar .back {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 18px; color: #2b2b2b;
    background: none; border: none; cursor: pointer; padding: 6px 10px;
  }
  .topbar .title {
    font-size: 26px; color: #2b2b2b;
    text-shadow: none;
  }
  .topbar .spacer { width: 44px; }

  /* 헤더 타이틀 */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 40px 16px 10px;
  }
  .logo {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(26px, 6vw, 44px);
    color: #3b2a1e;
    text-shadow: none;
  }
  .tag {
    display: inline-block; margin-top: 14px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(9px, 2vw, 16px);
    color: #b8894a; text-shadow: none;
    transform: rotate(-5deg);
  }

  /* 본문 */
  main {
    position: relative; z-index: 1;
    flex: 1; width: 100%;
    max-width: 820px; margin: 0 auto;
    padding: 24px 24px 60px;
    display: flex; flex-direction: column; gap: 18px;
  }

  .panel {
    background: #fffdf8;
    border: 1px solid rgba(139,94,60,0.35);
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(59,42,30,0.12);
    padding: 20px 22px;
  }
  .panel h2 {
    font-size: clamp(19px, 3.5vw, 24px);
    color: #b8894a;
    text-shadow: none;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: clamp(15px, 2.6vw, 18px);
  }
  th, td {
    border: 1px solid rgba(139,94,60,0.3);
    padding: 12px 8px;
    text-align: center;
    text-shadow: none;
  }
  th { background: #8b5e3c; color: #fff; }
  td { background: #fff; }
  tr td:first-child { background: rgba(139,94,60,0.15); }

  footer {
    position: relative; z-index: 1;
    text-align: center; padding: 20px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 10px; color: #3b2a1e;
    text-shadow: none;
  }
</style>
</head>
<body data-scene="classroom" data-chalk="">

  <!-- 상단 바 -->
  <div class="topbar">
    <button class="back" onclick="location.href='admission-menu.html'">&lt;</button>
    <div class="title">3년간 경쟁률</div>
    <div class="spacer"></div>
  </div>

  <header>
    <h1 class="logo">3년간 경쟁률</h1>
  </header>

  <main>
    <section class="panel">
      <h2>미술과 경쟁률</h2>
      <table>
        <tr><th>연도</th><th>경쟁률</th></tr>
        <tr><td>2026</td><td>1.88 : 1</td></tr>
        <tr><td>2025</td><td>1.40 : 1</td></tr>
        <tr><td>2024</td><td>1.68 : 1</td></tr>
      </table>
    </section>
  </main>

  <footer>v26.21 · ©경기예술고등학교</footer>

<script src="scene.js"></script>
</body>
</html>
