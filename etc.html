<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그 외 · 경기 예고</title>
<link rel="stylesheet" href="scene.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    color: #3b2a1e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #f5efe4;
    background-attachment: fixed;
    overflow-x: hidden;
  }

  /* 상단 바 */
  .topbar {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    background: #e6d8c3;
    border-bottom: 1px solid rgba(139,94,60,0.3);
    padding: 14px 18px;
  }
  .topbar .back {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 18px; color: #2b2b2b;
    background: none; border: none; cursor: pointer; padding: 6px 10px;
  }
  .topbar .title {
    font-size: 26px; color: #2b2b2b;
  }
  .topbar .spacer { width: 44px; }

  /* 헤더 타이틀 */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 40px 16px 10px;
  }
  .logo {
    font-family: 'Nanum Myeongjo', serif;
    font-weight: 800;
    font-size: clamp(28px, 6vw, 52px);
    color: #3b2a1e;
    letter-spacing: 5px;
  }

  /* 본문 */
  main {
    position: relative; z-index: 1;
    flex: 1; width: 100%;
    max-width: 820px; margin: 0 auto;
    padding: 24px 24px 60px;
    display: flex; flex-direction: column; gap: 18px;
  }

  .panel {
    background: #fffdf8;
    border: 1px solid rgba(139,94,60,0.35);
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(59,42,30,0.12);
    padding: 20px 22px;
  }
  .panel h2 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(19px, 3.5vw, 24px);
    color: #b8894a;
    margin-bottom: 14px;
  }
  .panel p, .panel li {
    font-size: clamp(15px, 2.6vw, 18px);
    line-height: 1.7;
    color: #3b2a1e;
  }
  .panel ul { list-style: none; }
  .panel ul li::before { content: "· "; color: #b8894a; font-weight: 700; }

  footer {
    position: relative; z-index: 1;
    text-align: center; padding: 20px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 10px; color: #3b2a1e;
  }
</style>
</head>
<body data-scene="classroom">

  <!-- 상단 바 -->
  <div class="topbar">
    <button class="back" onclick="location.href='index.html'">&lt;</button>
    <div class="title">그 외</div>
    <div class="spacer"></div>
  </div>

  <header>
    <h1 class="logo">그 외</h1>
  </header>

  <main>
    <section class="panel">
      <p>내용이 준비 중입니다.</p>
    </section>
  </main>

  <footer>v26.21 · ©경기예술고등학교</footer>

<script src="scene.js"></script>
</body>
</html>
