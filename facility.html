<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시설 사진 · 경기 예고</title>
<link rel="stylesheet" href="scene.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    color: #3b2a1e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #f5efe4;
    background-attachment: fixed;
    overflow-x: hidden;
  }

  /* 상단 바 */
  .topbar {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    background: #e6d8c3;
    border-bottom: 1px solid rgba(139,94,60,0.3);
    padding: 14px 18px;
  }
  .topbar .back {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 18px; color: #2b2b2b;
    background: none; border: none; cursor: pointer; padding: 6px 10px;
  }
  .topbar .title { font-size: 26px; color: #2b2b2b; }
  .topbar .spacer { width: 44px; }

  /* 헤더 타이틀 */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 40px 16px 10px;
  }
  .logo {
    font-family: 'Nanum Myeongjo', serif;
    font-weight: 800;
    font-size: clamp(28px, 6vw, 52px);
    color: #3b2a1e;
    letter-spacing: 5px;
  }

  /* 본문 */
  main {
    position: relative; z-index: 1;
    flex: 1; width: 100%;
    max-width: 860px; margin: 0 auto;
    padding: 24px 24px 60px;
    display: flex; flex-direction: column; gap: 22px;
  }

  /* 사진 카드 */
  .photo {
    background: #fffdf8;
    border: 1px solid rgba(139,94,60,0.35);
    border-radius: 14px;
    box-shadow: 0 4px 12px rgba(59,42,30,0.12);
    overflow: hidden;
  }
  .photo img {
    width: 100%; height: auto; display: block;
  }
  .photo figcaption {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(14px, 2.6vw, 17px);
    color: #b8894a;
    padding: 12px 18px;
    border-top: 1px solid rgba(139,94,60,0.2);
  }

  /* 묶음 섹션 (전시회) */
  .photo-group {
    background: #fffdf8;
    border: 1px solid rgba(139,94,60,0.35);
    border-radius: 14px;
    box-shadow: 0 4px 12px rgba(59,42,30,0.12);
    padding: 18px 18px 20px;
  }
  .photo-group h2 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(17px, 3.4vw, 22px);
    color: #b8894a;
    margin-bottom: 14px;
  }
  .group-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .group-grid img {
    width: 100%; height: auto; display: block;
    border-radius: 10px;
    border: 1px solid rgba(139,94,60,0.25);
    box-shadow: 0 2px 8px rgba(59,42,30,0.1);
  }

  /* 건물 사진은 나란히 */
  .buildings {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  .buildings .photo img {
    aspect-ratio: 4 / 3;
    object-fit: cover;
  }

  footer {
    position: relative; z-index: 1;
    text-align: center; padding: 20px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 10px; color: #3b2a1e;
  }
</style>
</head>
<body data-scene="classroom">

  <!-- 상단 바 -->
  <div class="topbar">
    <button class="back" onclick="location.href='index.html'">&lt;</button>
    <div class="title">시설 사진</div>
    <div class="spacer"></div>
  </div>

  <header>
    <h1 class="logo">시설 사진</h1>
  </header>

  <main>

    <!-- 학교 전경 -->
    <figure class="photo">
      <img src="images/facility-1.jpg" alt="학교 전경">
      <figcaption>학교 전경</figcaption>
    </figure>

    <!-- 전시회 (3장 묶음) -->
    <section class="photo-group">
      <h2>전시회</h2>
      <div class="group-grid">
        <img src="images/facility-2.jpg" alt="전시회 전경">
        <img src="images/facility-3.jpg" alt="전시회 작품 전시">
        <img src="images/facility-4.jpg" alt="전시회 전시장">
      </div>
    </section>

    <!-- 학교 건물 -->
    <div class="buildings">
      <figure class="photo">
        <img src="images/facility-5.png" alt="학교 건물">
        <figcaption>학교 건물</figcaption>
      </figure>
      <figure class="photo">
        <img src="images/facility-6.png" alt="음악관">
        <figcaption>음악관</figcaption>
      </figure>
      <figure class="photo">
        <img src="images/facility-7.png" alt="아트홀">
        <figcaption>아트홀</figcaption>
      </figure>
    </div>

  </main>

  <footer>v26.21 · ©경기예술고등학교</footer>

<script src="scene.js"></script>
</body>
</html>
