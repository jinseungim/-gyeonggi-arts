<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입시 정보 · 경기 예고</title>
<link rel="stylesheet" href="scene.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    color: #3b2a1e;
    min-height: 100vh;
    background: #f5efe4;
    background-attachment: fixed;
  }

  /* 떨어지는 벚꽃잎 */
  .petal {
    position: fixed; top: -20px; width: 12px; height: 12px;
    background: #b8894a; border-radius: 60% 0 60% 0;
    opacity: 0.6; z-index: 0; pointer-events: none;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) translateX(0) rotate(0deg); }
    100% { transform: translateY(110vh) translateX(60px) rotate(360deg); }
  }

  /* 상단 바 */
  .topbar {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    background: #e6d8c3;
    border-bottom: 1px solid rgba(139,94,60,0.3);
    padding: 14px 18px;
  }
  .topbar .back {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 18px; color: #2b2b2b;
    background: none; border: none; cursor: pointer; padding: 6px 10px;
  }
  .topbar .title {
    font-size: 26px; color: #2b2b2b;
    text-shadow: none;
  }
  .topbar .social {
    display: flex; align-items: center; gap: 8px;
    background: #c2c2c2; border: 1px solid rgba(139,94,60,0.3);
    padding: 8px 16px; cursor: pointer; color: #2b2b2b; font-size: 18px;
    box-shadow: 0 4px 12px rgba(59,42,30,0.12);
  }
  .topbar .social .ico {
    width: 22px; height: 22px;
    background: repeating-linear-gradient(45deg,#a9743f 0 4px,#6f4e2f 4px 8px);
    border: 1px solid #2b2b2b;
  }

  /* 탭 영역 */
  .tabs {
    position: relative; z-index: 2;
    display: flex; gap: 10px;
    padding: 16px 18px 0;
    max-width: 1500px; margin: 0 auto;
  }
  .tab {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fffdf8;
    border: 1px solid rgba(139,94,60,0.35);
    border-radius: 10px;
    color: #3b2a1e; font-size: 19px; padding: 18px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(59,42,30,0.12);
    text-shadow: none;
  }
  .tab .ico {
    width: 22px; height: 22px; border: 1px solid #000;
  }
  .tab .ico.cherry { background: repeating-linear-gradient(45deg,#d9b98c 0 4px,#8b5e3c 4px 8px); }
  .tab .ico.purple { background: #fffdf8; }
  .tab .ico.globe  { background: radial-gradient(circle at 35% 35%, #6bbf59, #3a7a9c); }
  .tab.active {
    background: rgba(70,70,70,0.92);
    border-bottom: 4px solid #fff;
  }

  /* 본문 영역 */
  .content {
    position: relative; z-index: 2;
    max-width: 1500px; margin: 0 auto;
    padding: 14px 18px 60px;
  }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; gap: 12px;
  }
  .list-ico {
    width: 52px; height: 52px;
    background: #fffdf8; border: 1px solid rgba(139,94,60,0.35);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 4px 12px rgba(59,42,30,0.12);
  }
  .list-ico span {
    width: 24px; height: 3px; background: #fff;
    box-shadow: 0 6px 0 #fff, 0 12px 0 #fff; margin-bottom: 9px;
  }
  .create-btn {
    background: #fffdf8; border: 1px solid rgba(139,94,60,0.35);
    border-radius: 10px; color: #3b2a1e;
    font-family: 'Nanum Myeongjo', serif; font-size: 22px; padding: 16px 34px; cursor: pointer;
    box-shadow: 0 4px 12px rgba(59,42,30,0.12);
    text-shadow: none;
  }
  .create-btn:active { transform: translateY(2px); }

  /* 항목 카드 */
  .entry {
    display: flex; align-items: stretch; gap: 0;
    background: #fffdf8;
    border: 1px solid rgba(139,94,60,0.35);
    border-radius: 10px; margin-bottom: 12px;
    box-shadow: 0 4px 12px rgba(59,42,30,0.12);
  }
  .entry .thumb {
    width: 150px; min-height: 92px; border-right: 3px solid #2b2b2b;
    background-size: cover; background-position: center; flex-shrink: 0;
  }
  .thumb.t1 { background: linear-gradient(135deg,#a9743f,#6f4e2f); }
  .thumb.t2 { background: linear-gradient(135deg,#c49a6c,#8b5e3c); }
  .thumb.t3 { background: linear-gradient(135deg,#e0c48f,#a9743f); }
  .entry .body {
    flex: 1; padding: 16px 18px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .entry .name { font-size: 24px; }
  .entry .badge {
    display: inline-block; margin-top: 8px; align-self: flex-start;
    background: rgba(20,20,20,0.8); border: 1px solid #555;
    font-size: 14px; padding: 3px 10px; color: #ddd;
  }
  .entry .meta {
    display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
    padding: 0 18px; font-size: 15px; color: #ccc; text-align: right; gap: 4px;
    min-width: 130px;
  }
  .entry .edit {
    width: 110px; border-left: 3px solid #2b2b2b;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; cursor: pointer; color: #3b2a1e; font-size: 17px;
    background: rgba(60,60,60,0.4);
  }
  .entry .edit:hover { background: rgba(90,90,90,0.6); }
  .entry .edit .pen {
    width: 22px; height: 22px;
    background:
      linear-gradient(45deg, transparent 45%, #fff 45% 55%, transparent 55%),
      linear-gradient(-45deg, transparent 60%, #ddd 60%);
    border: 1px solid #2b2b2b;
    transform: rotate(0deg);
  }

  @media (max-width: 640px) {
    .entry .meta { display: none; }
    .entry .thumb { width: 90px; }
    .tab { font-size: 14px; padding: 12px 6px; }
    .tab span.txt { display:none; }
  }
</style>
</head>
<body data-scene="classroom" data-chalk="">

  <!-- 상단 바 -->
  <div class="topbar">
    <button class="back" onclick="location.href='index.html'">&lt;</button>
    <div class="title">입시 정보</div>
    <button class="social"><span class="ico"></span>문의</button>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab active"><span class="ico cherry"></span><span class="txt">전형 일정 (3)</span></div>
    <div class="tab"><span class="ico purple"></span><span class="txt">모집 요강</span></div>
    <div class="tab"><span class="ico globe"></span><span class="txt">온라인 원서</span></div>
  </div>

  <!-- 본문 -->
  <div class="content">
    <div class="toolbar">
      <div class="list-ico"><span></span></div>
      <button class="create-btn">원서 접수하기</button>
    </div>

    <div class="entry">
      <div class="thumb t1"></div>
      <div class="body">
        <div class="name">1차 원서 접수</div>
        <div class="badge">미술과 · 실기 전형</div>
      </div>
      <div class="meta">
        <div>온라인 접수</div>
        <div>06/02 ~ 06/09</div>
      </div>
      <div class="edit"><span class="pen"></span>자세히</div>
    </div>

    <div class="entry">
      <div class="thumb t2"></div>
      <div class="body">
        <div class="name">실기 고사</div>
        <div class="badge">소묘 · 발상과 표현</div>
      </div>
      <div class="meta">
        <div>본교 미술관</div>
        <div>06/21</div>
      </div>
      <div class="edit"><span class="pen"></span>자세히</div>
    </div>

    <div class="entry">
      <div class="thumb t3"></div>
      <div class="body">
        <div class="name">최종 합격자 발표</div>
        <div class="badge">서류 + 실기 + 면접</div>
      </div>
      <div class="meta">
        <div>홈페이지 공지</div>
        <div>07/05</div>
      </div>
      <div class="edit"><span class="pen"></span>자세히</div>
    </div>
  </div>

<script src="scene.js"></script>
</body>
</html>
